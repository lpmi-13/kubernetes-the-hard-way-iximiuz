apiVersion: v1
kind: ServiceAccount
metadata:
  name: hubble-gazer
  namespace: kube-system
  labels:
    app: hubble-gazer
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hubble-gazer
  labels:
    app: hubble-gazer
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hubble-gazer
  labels:
    app: hubble-gazer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hubble-gazer
subjects:
- kind: ServiceAccount
  name: hubble-gazer
  namespace: kube-system
---
apiVersion: v1
kind: Service
metadata:
  name: hubble-relay-grpc
  namespace: kube-system
  labels:
    app: hubble-gazer
spec:
  type: ClusterIP
  ports:
  - port: 4245
    targetPort: grpc
    protocol: TCP
    name: grpc
  selector:
    k8s-app: hubble-relay
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hubble-gazer
  namespace: kube-system
  labels:
    app: hubble-gazer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hubble-gazer
  template:
    metadata:
      labels:
        app: hubble-gazer
    spec:
      serviceAccountName: hubble-gazer
      containers:
      - name: hubble-gazer
        image: ghcr.io/lpmi-13/hubble-gazer:0.5.0
        ports:
        - containerPort: 3000
        env:
        - name: HUBBLE_RELAY_ADDR
          value: hubble-relay-grpc.kube-system.svc.cluster.local:4245
        - name: LISTEN_ADDR
          value: ":3000"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
        readinessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: hubble-gazer
  namespace: kube-system
  labels:
    app: hubble-gazer
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  selector:
    app: hubble-gazer
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hubble-gazer
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      app: hubble-gazer
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - port: 3000
      protocol: TCP
  egress:
  - to:
    - podSelector:
        matchLabels:
          k8s-app: hubble-relay
    ports:
    - port: 4245
      protocol: TCP
  - ports:
    - port: 443
      protocol: TCP
  - to: []
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
