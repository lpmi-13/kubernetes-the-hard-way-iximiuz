apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
# Productpage
apiVersion: apps/v1
kind: Deployment
metadata:
  name: productpage-v1
  namespace: demo
  labels:
    app: productpage
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productpage
      version: v1
  template:
    metadata:
      labels:
        app: productpage
        version: v1
    spec:
      containers:
      - name: productpage
        image: docker.io/istio/examples-bookinfo-productpage-v1:1.20.2
        ports:
        - containerPort: 9080
        readinessProbe:
          httpGet:
            path: /health
            port: 9080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: productpage
  namespace: demo
  labels:
    app: productpage
spec:
  type: NodePort
  ports:
  - port: 9080
    targetPort: 9080
    name: http
  selector:
    app: productpage
---
