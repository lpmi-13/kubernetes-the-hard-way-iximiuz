apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
# Keep the static Bookinfo layer intentionally small so Hubble-gazer stays
# readable and the queue worker scale-out is visually obvious.
# Productpage
apiVersion: apps/v1
kind: Deployment
metadata:
  name: productpage-v1
  namespace: demo
  labels:
    app: productpage
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: productpage
      version: v1
  template:
    metadata:
      labels:
        app: productpage
        kthw-demo-spread: shared
        version: v1
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: productpage
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            kthw-demo-spread: shared
      containers:
      - name: productpage
        image: ghcr.io/lpmi-13/istio-examples-bookinfo-productpage-v1:1.20.2
        ports:
        - containerPort: 9080
        readinessProbe:
          httpGet:
            path: /health
            port: 9080
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: productpage
  namespace: demo
  labels:
    app: productpage
spec:
  type: NodePort
  ports:
  - port: 9080
    targetPort: 9080
    name: http
  selector:
    app: productpage
---
