apiVersion: v1
kind: Pod
metadata:
  name: traffic-generator
  namespace: demo
  labels:
    app: traffic-generator
spec:
  containers:
  - name: traffic-generator
    image: curlimages/curl:8.12.1
    command:
    - /bin/sh
    - -c
    - |
      echo "Starting traffic generation against productpage..."
      while true; do
        curl -s -o /dev/null -w "%{http_code}" http://productpage.demo:9080/productpage
        echo ""
        sleep 2
      done
  restartPolicy: Always
